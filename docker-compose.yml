services:
  api:
    build: .
    command: uv run uvicorn llm_rpg.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://llm_rpg:llm_rpg@postgres:5432/llm_rpg}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: uv run python -m llm_rpg.worker.main
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://llm_rpg:llm_rpg@postgres:5432/llm_rpg}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_rpg
      POSTGRES_USER: llm_rpg
      POSTGRES_PASSWORD: llm_rpg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_rpg -d llm_rpg"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  e2e:
    build: .
    profiles:
      - e2e
    command: uv run pytest tests/e2e
    environment:
      DATABASE_URL: sqlite+aiosqlite://
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
